<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QA Test Case Tracker</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'IBM Plex Sans',sans-serif;background:#0e1016;color:#c8cdd6;height:100vh;display:flex;flex-direction:column;overflow:hidden;}

#topbar{
  background:#13161f;border-bottom:1px solid #1e2330;
  padding:8px 16px;display:flex;align-items:center;gap:8px;flex-shrink:0;
}
#topbar .title{font-size:13px;font-weight:600;color:#eef0f4;letter-spacing:.03em;margin-right:auto;}
#topbar .title span{color:#4c8eff;margin-right:4px;}

.env-pill{font-size:9px;font-weight:700;letter-spacing:.12em;padding:3px 9px;border-radius:2px;text-transform:uppercase;display:flex;align-items:center;gap:5px;}
.env-pill::before{content:'';width:6px;height:6px;border-radius:50%;}
.env-pill.qa{background:#0d1f3c;color:#4c8eff;border:1px solid #1a3a7a;}
.env-pill.qa::before{background:#4c8eff;box-shadow:0 0 5px #4c8eff;}
.env-pill.prod{background:#2a0e0e;color:#ff5c5c;border:1px solid #6b1a1a;}
.env-pill.prod::before{background:#ff5c5c;box-shadow:0 0 5px #ff5c5c;}

#file-input{display:none;}
.file-btn{
  font-size:10px;font-weight:600;padding:5px 11px;border-radius:3px;
  cursor:pointer;border:1px solid #1e2330;background:#1a1e2b;color:#7a8499;
  letter-spacing:.04em;transition:all .15s;display:flex;align-items:center;gap:5px;
  font-family:'IBM Plex Sans',sans-serif;white-space:nowrap;
}
.file-btn:hover{background:#1e2435;color:#c8cdd6;border-color:#2e3550;}
.file-btn.save{color:#3a7a50;border-color:#1a3a28;}
.file-btn.save:hover{background:#0d2018;color:#3fb97a;border-color:#1a5c35;}

#filename-tag{font-size:10px;color:#3a4460;font-style:italic;max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}

#main{display:flex;flex:1;overflow:hidden;}

/* EDITOR */
#editor-pane{width:44%;border-right:1px solid #1e2330;display:flex;flex-direction:column;position:relative;}
.pane-bar{padding:7px 14px;font-size:9px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:#444c60;background:#13161f;border-bottom:1px solid #1e2330;flex-shrink:0;}
#editor{flex:1;background:#0b0d14;color:#9ea8b8;border:none;outline:none;padding:16px 18px;font-family:'IBM Plex Mono',monospace;font-size:12px;line-height:1.8;resize:none;tab-size:2;}
#editor::placeholder{color:#2a3040;}

/* DROP OVERLAY */
#drop-overlay{display:none;position:absolute;inset:0;background:#0e1016dd;z-index:99;align-items:center;justify-content:center;flex-direction:column;gap:10px;border:2px dashed #4c8eff;}
#drop-overlay.active{display:flex;}
#drop-overlay p{font-size:15px;font-weight:600;color:#4c8eff;}
#drop-overlay small{font-size:11px;color:#3a5080;}

/* PREVIEW */
#preview-pane{flex:1;display:flex;flex-direction:column;overflow:hidden;}
#preview{flex:1;overflow-y:auto;padding:16px 20px;}
#preview::-webkit-scrollbar{width:5px;}
#preview::-webkit-scrollbar-track{background:#0e1016;}
#preview::-webkit-scrollbar-thumb{background:#1e2330;border-radius:3px;}

/* MD ELEMENTS */
#preview h2{font-size:13px;font-weight:600;color:#eef0f4;letter-spacing:.05em;margin:20px 0 7px;padding-bottom:6px;border-bottom:1px solid #1e2330;text-transform:uppercase;}
#preview h2:first-child{margin-top:0;}
#preview h3{font-size:12px;font-weight:600;color:#4c8eff;margin:14px 0 6px;}
#preview h4{font-size:11.5px;font-weight:600;color:#7aa8ff;margin:10px 0 4px;}
#preview hr{border:none;border-top:1px solid #1a1e2b;margin:8px 0;}
#preview p{font-size:12px;color:#5a6275;margin:3px 0;}
#preview ul,#preview ol{list-style:none;padding-left:12px;margin:2px 0;}
#preview li{display:flex;align-items:flex-start;padding:2px 0;font-size:12px;line-height:1.75;border-bottom:1px solid transparent;transition:border-color .15s;}
#preview li:hover{border-bottom-color:#1a1e2b;}

.li-dot{color:#2a3350;flex-shrink:0;margin-right:7px;margin-top:1px;font-size:14px;line-height:1.6;}
.li-content{flex:1;min-width:0;word-break:break-word;}
.li-cbs{flex-shrink:0;display:flex;gap:3px;margin-left:8px;padding-top:3px;}

#preview li>.li-content>ul,
#preview li>.li-content>ol{margin-top:3px;padding-left:14px;}

/* CHECKBOXES */
.cb-btn{display:flex;align-items:center;gap:2px;padding:1px 6px 1px 4px;border-radius:2px;cursor:pointer;font-size:8.5px;font-weight:700;letter-spacing:.1em;border:1px solid transparent;transition:all .12s;user-select:none;line-height:1.6;}
.cb-btn input{width:10px;height:10px;cursor:pointer;margin:0;flex-shrink:0;}
.cb-btn.qa{color:#2a5099;border-color:#0d1f3c;}
.cb-btn.qa:hover{color:#4c8eff;border-color:#1a3a7a;}
.cb-btn.qa.on{background:#0d1f3c;color:#4c8eff;border-color:#1a3a7a;}
.cb-btn.qa input{accent-color:#4c8eff;}
.cb-btn.prod{color:#7a2a2a;border-color:#2a0e0e;}
.cb-btn.prod:hover{color:#ff5c5c;border-color:#6b1a1a;}
.cb-btn.prod.on{background:#2a0e0e;color:#ff5c5c;border-color:#6b1a1a;}
.cb-btn.prod input{accent-color:#ff5c5c;}

/* CODE */
#preview code{font-family:'IBM Plex Mono',monospace;font-size:10.5px;padding:1px 6px;border-radius:2px;background:#1a1d26;color:#5a6275;border:1px solid #1e2330;}
code.status-done{color:#3fb97a !important;background:#0a1f13 !important;border-color:#0d3320 !important;}
code.status-pending{color:#e3a847 !important;background:#1f1800 !important;border-color:#3d3010 !important;}
code.status-error{color:#ff5c5c !important;background:#1a0a0a !important;border-color:#3d1010 !important;}

/* STATS BAR */
#stats{background:#0b0d14;border-top:1px solid #1e2330;padding:5px 16px;display:flex;gap:16px;font-size:10px;color:#3a4460;flex-shrink:0;}
#stats span b{color:#7a8499;}
#stats .s-done{color:#3fb97a;}
#stats .s-qa{color:#4c8eff;}
#stats .s-prod{color:#ff5c5c;}
</style>
</head>
<body>

<div id="topbar">
  <span class="title"><span>▸</span> QA Test Case Tracker</span>
  <input type="file" id="file-input" accept=".md,.txt,.markdown">
  <button class="file-btn" onclick="document.getElementById('file-input').click()">
    <svg width="11" height="11" viewBox="0 0 16 16" fill="currentColor"><path d="M14.5 3h-13a.5.5 0 0 0-.5.5v9a.5.5 0 0 0 .5.5h13a.5.5 0 0 0 .5-.5v-9a.5.5 0 0 0-.5-.5zm-13-1A1.5 1.5 0 0 0 0 3.5v9A1.5 1.5 0 0 0 1.5 14h13a1.5 1.5 0 0 0 1.5-1.5v-9A1.5 1.5 0 0 0 14.5 2h-13z"/><path d="M3 5.5a.5.5 0 0 1 .5-.5h9a.5.5 0 0 1 0 1h-9a.5.5 0 0 1-.5-.5zM3 8a.5.5 0 0 1 .5-.5h9a.5.5 0 0 1 0 1h-9A.5.5 0 0 1 3 8zm0 2.5a.5.5 0 0 1 .5-.5h6a.5.5 0 0 1 0 1h-6a.5.5 0 0 1-.5-.5z"/></svg>
    Load .md File
  </button>
  <button class="file-btn save" onclick="saveFile()">
    <svg width="11" height="11" viewBox="0 0 16 16" fill="currentColor"><path d="M2 1a1 1 0 0 0-1 1v12a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1V4.5L11.5 1H2zm9.5 0v3H13L11.5 1zM4 7h8a.5.5 0 0 1 0 1H4a.5.5 0 0 1 0-1zm0 2.5h8a.5.5 0 0 1 0 1H4a.5.5 0 0 1 0-1z"/></svg>
    Save .md
  </button>
  <span id="filename-tag">no file loaded</span>
  <span class="env-pill qa">QA</span>
  <span class="env-pill prod">Prod</span>
</div>

<div id="main">
  <div id="editor-pane">
    <div class="pane-bar">✎ &nbsp;Markdown Editor — drag & drop .md file here</div>
    <textarea id="editor" spellcheck="false" placeholder="Paste your markdown here, or use 'Load .md File' button above, or drag & drop a .md file onto this panel..."></textarea>
    <div id="drop-overlay">
      <p>⬇ Drop your .md file</p>
      <small>.md · .txt · .markdown</small>
    </div>
  </div>
  <div id="preview-pane">
    <div class="pane-bar">◈ &nbsp;Live Preview</div>
    <div id="preview"></div>
  </div>
</div>

<div id="stats">
  <span>Total: <b id="st-total">0</b></span>
  <span class="s-qa">QA checked: <b id="st-qa">0</b></span>
  <span class="s-prod">Prod checked: <b id="st-prod">0</b></span>
  <span class="s-done">` Done ` items: <b id="st-done">0</b></span>
</div>

<script>
const cbState = {};
let currentFilename = 'test-cases.md';

/* ── File load via button ── */
document.getElementById('file-input').addEventListener('change', e => {
  const f = e.target.files[0];
  if (f) readFile(f);
  e.target.value = '';
});

/* ── Drag & drop ── */
const editorPane = document.getElementById('editor-pane');
const overlay = document.getElementById('drop-overlay');

editorPane.addEventListener('dragover', e => { e.preventDefault(); overlay.classList.add('active'); });
editorPane.addEventListener('dragleave', e => { if (!editorPane.contains(e.relatedTarget)) overlay.classList.remove('active'); });
editorPane.addEventListener('drop', e => {
  e.preventDefault();
  overlay.classList.remove('active');
  const f = e.dataTransfer.files[0];
  if (f) readFile(f);
});

function readFile(f) {
  const reader = new FileReader();
  reader.onload = ev => {
    document.getElementById('editor').value = ev.target.result;
    currentFilename = f.name;
    document.getElementById('filename-tag').textContent = f.name;
    render();
  };
  reader.readAsText(f);
}

/* ── Save ── */
function saveFile() {
  const md = document.getElementById('editor').value;
  const blob = new Blob([md], { type: 'text/markdown' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = currentFilename;
  a.click();
  URL.revokeObjectURL(a.href);
}

/* ── Render ── */
function getKey(li) {
  let t = '';
  for (const n of li.childNodes) {
    if (n.nodeType === 3) t += n.textContent;
    else if (n.tagName && !['UL','OL'].includes(n.tagName)) t += n.textContent;
  }
  return t.trim().slice(0, 90);
}

function makeCbBtn(key, env) {
  const btn = document.createElement('label');
  btn.className = 'cb-btn ' + env;
  if (cbState[key]?.[env]) btn.classList.add('on');
  const inp = document.createElement('input');
  inp.type = 'checkbox';
  inp.checked = !!cbState[key]?.[env];
  inp.addEventListener('change', e => {
    e.stopPropagation();
    if (!cbState[key]) cbState[key] = {};
    cbState[key][env] = inp.checked;
    btn.classList.toggle('on', inp.checked);
    updateStats();
  });
  btn.appendChild(inp);
  btn.appendChild(document.createTextNode(env === 'qa' ? 'QA' : 'PROD'));
  return btn;
}

function processLi(li) {
  const key = getKey(li);
  if (!key) return;
  const inline = [], nested = [];
  for (const n of [...li.childNodes]) {
    (n.tagName === 'UL' || n.tagName === 'OL') ? nested.push(n) : inline.push(n);
  }
  li.innerHTML = '';
  const dot = document.createElement('span');
  dot.className = 'li-dot'; dot.textContent = '›';
  li.appendChild(dot);
  const content = document.createElement('span');
  content.className = 'li-content';
  inline.forEach(n => content.appendChild(n));
  nested.forEach(n => content.appendChild(n));
  li.appendChild(content);
  const cbs = document.createElement('span');
  cbs.className = 'li-cbs';
  cbs.appendChild(makeCbBtn(key, 'qa'));
  cbs.appendChild(makeCbBtn(key, 'prod'));
  li.appendChild(cbs);
}

function colorCodes(preview) {
  preview.querySelectorAll('code').forEach(c => {
    const t = c.textContent.trim();
    const tl = t.toLowerCase();
    c.classList.remove('status-done','status-pending','status-error');
    if (t === 'Done')                                      c.classList.add('status-done');
    else if (t === 'Pending')                              c.classList.add('status-pending');
    else if (tl.startsWith('issue') || tl.startsWith('error')) c.classList.add('status-error');
    // else: gray (default)
  });
}

function updateStats() {
  const preview = document.getElementById('preview');
  const allLis  = preview.querySelectorAll('li');
  const qaCbs   = preview.querySelectorAll('.cb-btn.qa.on');
  const prodCbs = preview.querySelectorAll('.cb-btn.prod.on');
  const doneCodes = preview.querySelectorAll('code.status-done');
  document.getElementById('st-total').textContent = allLis.length;
  document.getElementById('st-qa').textContent    = qaCbs.length;
  document.getElementById('st-prod').textContent  = prodCbs.length;
  document.getElementById('st-done').textContent  = doneCodes.length;
}

function render() {
  const md = document.getElementById('editor').value;
  const preview = document.getElementById('preview');
  preview.innerHTML = marked.parse(md);
  preview.querySelectorAll('li').forEach(processLi);
  preview.querySelectorAll('ol').forEach(ol => {
    ol.querySelectorAll(':scope > li').forEach((li, i) => {
      const dot = li.querySelector('.li-dot');
      if (dot) dot.textContent = (i + 1) + '.';
    });
  });
  colorCodes(preview);
  updateStats();
}

document.getElementById('editor').addEventListener('input', render);
marked.setOptions({ gfm: true, breaks: false });
render();
</script>
</body>
</html>
