<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QA Test Case Tracker</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="topbar">
  <span class="title"><span>▸</span> QA Test Case Tracker</span>
  <input type="file" id="file-input" accept=".md,.txt,.markdown">
  <button class="file-btn" onclick="document.getElementById('file-input').click()">
    <svg width="11" height="11" viewBox="0 0 16 16" fill="currentColor"><path d="M14.5 3h-13a.5.5 0 0 0-.5.5v9a.5.5 0 0 0 .5.5h13a.5.5 0 0 0 .5-.5v-9a.5.5 0 0 0-.5-.5zm-13-1A1.5 1.5 0 0 0 0 3.5v9A1.5 1.5 0 0 0 1.5 14h13a1.5 1.5 0 0 0 1.5-1.5v-9A1.5 1.5 0 0 0 14.5 2h-13z"/><path d="M3 5.5a.5.5 0 0 1 .5-.5h9a.5.5 0 0 1 0 1h-9a.5.5 0 0 1-.5-.5zM3 8a.5.5 0 0 1 .5-.5h9a.5.5 0 0 1 0 1h-9A.5.5 0 0 1 3 8zm0 2.5a.5.5 0 0 1 .5-.5h6a.5.5 0 0 1 0 1h-6a.5.5 0 0 1-.5-.5z"/></svg>
    Load .md File
  </button>
  <button class="file-btn save" onclick="saveFile()">
    <svg width="11" height="11" viewBox="0 0 16 16" fill="currentColor"><path d="M2 1a1 1 0 0 0-1 1v12a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1V4.5L11.5 1H2zm9.5 0v3H13L11.5 1zM4 7h8a.5.5 0 0 1 0 1H4a.5.5 0 0 1 0-1zm0 2.5h8a.5.5 0 0 1 0 1H4a.5.5 0 0 1 0-1z"/></svg>
    Save .md
  </button>
  <span id="filename-tag">no file loaded</span>
  <button class="settings-btn" onclick="openSettings()" title="Configure GitHub & Jira">⚙ Integrations</button>
  <span class="env-pill qa">QA</span>
  <span class="env-pill prod">Prod</span>
</div>

<!-- SETTINGS MODAL -->
<div id="modal-overlay" onclick="if(event.target===this)closeSettings()">
  <div id="modal">
    <div id="modal-header">
      <h2>⚙ Integration Settings</h2>
      <button id="modal-close" onclick="closeSettings()">×</button>
    </div>
    <div id="modal-body">
      <div class="modal-section">
        <div class="modal-section-title gh">◆ GitHub Issues</div>
        <div class="field-row"><label>Repository Owner (username or org)</label><input id="gh-owner" placeholder="e.g. acme-corp"></div>
        <div class="field-row"><label>Repository Name</label><input id="gh-repo" placeholder="e.g. my-project"></div>
        <div class="field-row"><label>Personal Access Token (needs Issues: read/write scope)</label><input id="gh-token" type="password" placeholder="ghp_xxxxxxxxxxxx"></div>
      </div>
      <hr class="modal-divider">
      <div class="modal-section">
        <div class="modal-section-title jira">◆ Jira</div>
        <div class="field-row"><label>Jira Domain</label><input id="jira-domain" placeholder="e.g. yourcompany (from yourcompany.atlassian.net)"></div>
        <div class="field-row"><label>Email</label><input id="jira-email" placeholder="you@company.com"></div>
        <div class="field-row"><label>API Token</label><input id="jira-token" type="password" placeholder="Your Jira API token"></div>
        <div class="field-row"><label>Project Key</label><input id="jira-project" placeholder="e.g. QA or PROJ"></div>
      </div>
      <button class="modal-save" onclick="saveSettings()">Save Settings</button>
    </div>
  </div>
</div>

<div id="main">
  <div id="editor-pane">
    <div class="pane-bar">
      <span class="pane-title">✎ &nbsp;Markdown Editor — drag &amp; drop .md file here</span>
      <button class="pane-action-btn fullscreen-toggle" data-pane="editor-pane" title="Enter fullscreen" aria-label="Enter fullscreen" aria-pressed="false">
        <svg viewBox="0 0 16 16" aria-hidden="true">
          <path d="M1 6V1h5v1H2v4H1zm9-5h5v5h-1V2h-4V1zM1 10h1v4h4v1H1v-5zm13 0h1v5h-5v-1h4v-4z" />
        </svg>
      </button>
    </div>
    <textarea id="editor" spellcheck="false" placeholder="Paste your markdown here, or use 'Load .md File' button above, or drag & drop a .md file onto this panel..."></textarea>
    <div id="drop-overlay">
      <p>⬇ Drop your .md file</p>
      <small>.md · .txt · .markdown</small>
    </div>
  </div>
  <div id="preview-pane">
    <div class="pane-bar">
      <span class="pane-title">◈ &nbsp;Live Preview</span>
      <button class="pane-action-btn fullscreen-toggle" data-pane="preview-pane" title="Enter fullscreen" aria-label="Enter fullscreen" aria-pressed="false">
        <svg viewBox="0 0 16 16" aria-hidden="true">
          <path d="M1 6V1h5v1H2v4H1zm9-5h5v5h-1V2h-4V1zM1 10h1v4h4v1H1v-5zm13 0h1v5h-5v-1h4v-4z" />
        </svg>
      </button>
    </div>
    <div id="preview"></div>
  </div>
</div>

<div id="stats">
  <span>Total: <b id="st-total">0</b></span>
  <span class="s-qa">QA checked: <b id="st-qa">0</b></span>
  <span class="s-prod">Prod checked: <b id="st-prod">0</b></span>
  <span class="s-done">` Done ` items: <b id="st-done">0</b></span>
</div>


<script src="script.js"></script>
</body>
</html>
